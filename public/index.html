<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Practice Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>

    <!-- SIGN-IN SCREEN -->
    <div id="login-screen" class="login-screen">
      <div class="login-backdrop">
        <div class="note note-1">&#9835;</div>
        <div class="note note-2">&#9833;</div>
        <div class="note note-3">&#9839;</div>
        <div class="note note-4">&#9837;</div>
        <div class="note note-5">&#9835;</div>
      </div>
      <div class="login-card">
        <div class="login-logo">&#9835;</div>
        <h1 class="login-title">Music Practice Hub</h1>
        <p class="login-subtitle">Connect. Practice. Perform.</p>
        <form id="auth-form" class="login-form">
          <label>
            I am a
            <select id="role" required>
              <option value="teacher">Teacher</option>
              <option value="student">Student</option>
            </select>
          </label>
          <label>
            Name
            <input id="name" type="text" required placeholder="Your name" />
          </label>
          <label>
            Password
            <input id="password" type="password" minlength="4" required placeholder="Min 4 characters" />
          </label>
          <label id="teacher-code-label" hidden>
            Teacher Code
            <input id="teacher-code" type="text" placeholder="Required for first sign-in only" />
          </label>
          <label id="set-teacher-code-label" hidden>
            Set Your Teacher Code
            <input id="set-teacher-code" type="text" placeholder="Choose a code to share with students" />
          </label>
          <button type="submit" class="login-btn">Sign In</button>
        </form>
        <div id="login-error" class="login-error" hidden></div>
      </div>
    </div>

    <!-- APP (hidden until signed in) -->
    <div id="app-screen" hidden>
      <header class="topbar">
        <div class="topbar-content">
          <div>
            <h1>Music Practice Hub</h1>
            <p id="current-user" class="muted"></p>
          </div>
          <button id="sign-out-btn" type="button" class="sign-out-btn">Sign Out</button>
        </div>
      </header>

      <div id="teacher-code-display" class="teacher-code-display" hidden></div>

      <main class="layout">
        <section class="panel" id="teacher-panel" hidden>
          <h2>Teacher Dashboard</h2>
          <form id="assignment-form" class="stack">
            <h3>Create Assignment</h3>
            <label>
              Student
              <select id="assignment-student" required></select>
            </label>
            <label>
              Title
              <input id="assignment-title" type="text" required />
            </label>
            <label>
              Description
              <textarea id="assignment-description"></textarea>
            </label>
            <label>
              YouTube Reference URL
              <input id="assignment-youtube" type="url" placeholder="https://youtube.com/..." />
            </label>
            <fieldset class="day-picker">
              <legend>Assigned Dates</legend>
              <div class="date-select-row">
                <label>
                  Select Date
                  <input id="assignment-date-input" type="date" />
                </label>
                <button id="assignment-add-date" type="button">Add Date</button>
              </div>
              <div id="assignment-selected-dates" class="selected-date-list"></div>
            </fieldset>
            <label>
              Practice Goal
              <select id="assignment-practice-mode">
                <option value="minutes" selected>Practice Duration (minutes)</option>
                <option value="times">Practice Count (times)</option>
              </select>
            </label>
            <label>
              Target
              <select id="assignment-practice-target">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="30">30</option>
              </select>
            </label>
            <button type="submit">Assign</button>
          </form>
          <div class="stack archive-section">
            <h3>Archives</h3>
            <div id="archive-list" class="stack"></div>
          </div>
        </section>

        <section class="panel" id="student-panel" hidden>
          <h2>Student Practice Tools</h2>
          <div class="stack">
            <article class="tool-card stack">
              <h3>Metronome</h3>
              <label>
                BPM: <span id="metronome-bpm-value">80</span>
                <input id="metronome-bpm" type="range" min="40" max="220" value="80" />
              </label>
              <label>
                Beats Per Bar
                <select id="metronome-beats">
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4" selected>4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                </select>
              </label>
              <div class="tool-actions">
                <button id="metronome-start" type="button">Start</button>
                <button id="metronome-stop" type="button" disabled>Stop</button>
              </div>
              <div id="metronome-status" class="muted">Stopped</div>
            </article>

            <article class="tool-card stack">
              <h3>Tuner</h3>
              <label>
                Instrument
                <select id="tuner-instrument">
                  <option value="chromatic" selected>Chromatic (Any Instrument)</option>
                  <option value="violin">Violin</option>
                  <option value="viola">Viola</option>
                  <option value="cello">Cello</option>
                  <option value="guitar">Guitar</option>
                  <option value="bass-guitar">Bass Guitar</option>
                  <option value="ukulele">Ukulele</option>
                  <option value="voice">Voice</option>
                </select>
              </label>
              <div class="tool-actions">
                <button id="tuner-start" type="button">Start Tuner</button>
                <button id="tuner-stop" type="button" disabled>Stop Tuner</button>
              </div>
              <div id="tuner-status" class="muted">Stopped</div>
              <div class="tuner-readout">
                <div><strong>Note:</strong> <span id="tuner-note">-</span></div>
                <div><strong>Frequency:</strong> <span id="tuner-frequency">-</span></div>
                <div><strong>Detune:</strong> <span id="tuner-detune">-</span></div>
                <div><strong>Target:</strong> <span id="tuner-target">-</span></div>
              </div>
              <div class="tuner-meter">
                <div class="tuner-center"></div>
                <div id="tuner-needle"></div>
              </div>
              <div class="tuner-labels">
                <span>Flat</span>
                <span>In Tune</span>
                <span>Sharp</span>
              </div>
            </article>
          </div>
        </section>

        <section class="panel" id="assignments-panel" hidden>
          <h2>Assignments</h2>
          <div id="assignment-list" class="stack"></div>
        </section>

        <section class="panel" id="chat-panel" hidden>
          <h2>Teacher-Student Chat</h2>
          <div class="stack">
            <label>
              Chat With
              <select id="chat-partner"></select>
            </label>
            <div id="chat-box"></div>
            <form id="chat-form" class="chat-form">
              <input id="chat-input" type="text" placeholder="Type a message..." required />
              <button type="submit">Send</button>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
